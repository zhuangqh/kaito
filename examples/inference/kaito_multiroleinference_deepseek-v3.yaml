---
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
type: Opaque
data:
  HF_TOKEN: <base64-encoded-huggingface-token>
---
apiVersion: kaito.sh/v1alpha1
kind: MultiRoleInference
metadata:
  name: deepseek-v3-pd
spec:
  labelSelector:
    matchLabels:
      apps: deepseek-v3-pd
  model:
    name: deepseek-ai/DeepSeek-V3
    modelAccessSecret: hf-token
  roles:
    - type: prefill
      replicas: 1
      instanceType: "Standard_NC24ads_A100_v4"
    - type: decode
      replicas: 1
      instanceType: "Standard_NC24ads_A100_v4"
