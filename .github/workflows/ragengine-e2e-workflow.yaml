name: ragengine-e2e-workflow

on:
  workflow_call:
    inputs:
      git_sha:
        type: string
        required: true
      node_provisioner:
        type: string
        required: false
        default: gpuprovisioner
      tag:
        type: string
      isRelease:
        type: boolean
        default: false
      registry:
        type: string
      region:
        type: string
        description: "the azure location to run the e2e test in"
        default: "swedencentral"
      k8s_version:
        type: string
        default: "1.32.9"

jobs:
  e2e-tests:
    runs-on: [ "self-hosted", "hostname:kaito-e2e-github-runner" ]
    environment: e2e-test
    permissions:
      contents: read
      id-token: write

    env:
      TEST_SUITE: ${{ inputs.node_provisioner }}
      GO_VERSION: "1.25"
      KARPENTER_NAMESPACE: "karpenter"
      GPU_PROVISIONER_NAMESPACE: "gpu-provisioner"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.git_sha }}

      - name: Run e2e-base-setup composite action
        id: base-setup
        uses: ./.github/actions/e2e-base-setup
        with:
          git_sha: ${{ inputs.git_sha }}
          node_provisioner: ${{ inputs.node_provisioner }}
          tag: ${{ inputs.tag }}
          isRelease: ${{ inputs.isRelease }}
          region: ${{ inputs.region }}
          k8s_version: ${{ inputs.k8s_version }}
          registry: ${{ inputs.registry }}

      - name: Set Registry
        if: ${{ inputs.isRelease }}
        run: |
          echo "REGISTRY=${{ inputs.registry }}" >> $GITHUB_ENV
          echo "VERSION=$(echo ${{ inputs.tag }} | tr -d v)" >> $GITHUB_ENV

      - name: build kaito RAG Engine image
        if: ${{ !inputs.isRelease }}
        shell: bash
        run: |
          make docker-build-ragengine
        env:
          REGISTRY: ${{ env.CLUSTER_NAME }}.azurecr.io

      - name: build kaito RAG Engine service image
        if: ${{ !inputs.isRelease }}
        shell: bash
        run: |
          make docker-build-ragservice
        env:
          REGISTRY: ${{ env.CLUSTER_NAME }}.azurecr.io

      - name: Remove existing Go modules directory
        run: sudo rm -rf ~/go/pkg/mod

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install KAITO RAG Engine helm chart
        if: ${{ !inputs.isRelease }}
        shell: bash
        run: |
          make az-patch-install-ragengine-helm-e2e
          kubectl wait --for=condition=available deploy "kaito-ragengine" -n kaito-ragengine --timeout=300s
        env:
          REGISTRY: ${{ env.CLUSTER_NAME }}.azurecr.io
          AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
          AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}

      - name: Install KAITO RAG Engine helm chart from release
        if: ${{ inputs.isRelease }}
        shell: bash
        run: |
          make az-patch-install-ragengine-helm-e2e
          kubectl wait --for=condition=available deploy "kaito-ragengine" -n kaito-ragengine --timeout=300s
        env:
          REGISTRY: ${{ env.REGISTRY }}
          AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
          AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          RAGENGINE_SERVICE_IMG_TAG: ${{ env.VERSION }}

      - name: Create node pool for RAG workloads
        uses: azure/CLI@v2.2.0
        with:
          inlineScript: |
            set -euo pipefail

            RG="${{ env.CLUSTER_NAME }}"
            CLUSTER="${{ env.CLUSTER_NAME }}"
            MAX_RETRIES=12
            SLEEP_SECONDS=30

            for attempt in $(seq 1 ${MAX_RETRIES}); do
              state=$(az aks show --resource-group "${RG}" --name "${CLUSTER}" --query provisioningState -o tsv || echo "Unknown")
              echo "AKS provisioningState: ${state} (attempt ${attempt}/${MAX_RETRIES})"

              if [ "${state}" != "Succeeded" ]; then
                echo "Cluster operation still in progress. Waiting ${SLEEP_SECONDS}s before retrying..."
                sleep ${SLEEP_SECONDS}
                continue
              fi

              set +e
              output=$(az aks nodepool add \
                --resource-group "${RG}" \
                --cluster-name "${CLUSTER}" \
                --name ragpool \
                -s Standard_D8_v3 \
                -c 1 \
                --labels apps=phi-3 2>&1)
              status=$?
              set -e

              if [ ${status} -eq 0 ]; then
                echo "${output}"
                echo "ragpool node pool created successfully."
                exit 0
              fi

              echo "${output}"
              if echo "${output}" | grep -q "OperationNotAllowed"; then
                echo "Detected in-progress AKS operation. Retrying in ${SLEEP_SECONDS}s..."
                sleep ${SLEEP_SECONDS}
                continue
              fi

              echo "Node pool creation failed with a non-retryable error."
              exit ${status}
            done

            echo "Timed out waiting to create ragpool after ${MAX_RETRIES} attempts."
            exit 1
        env:
          AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
          AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}

      - name: Run e2e test
        run: |
          AI_MODELS_REGISTRY=$E2E_ACR_AMRT_USERNAME.azurecr.io \
          AI_MODELS_REGISTRY_SECRET=$E2E_AMRT_SECRET_NAME \
          GINKGO_LABEL=FastCheck \
          make kaito-ragengine-e2e-test
        env:
          AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          E2E_ACR_REGISTRY: ${{ env.CLUSTER_NAME }}.azurecr.io
          E2E_ACR_REGISTRY_SECRET: ${{ env.CLUSTER_NAME }}-acr-secret

      - name: Cleanup e2e resources
        if: ${{ always() }}
        env:
          AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        uses: azure/CLI@v2.2.0
        with:
          inlineScript: |
            set +e
            az group delete --name "${AZURE_RESOURCE_GROUP}" --yes --no-wait || true
