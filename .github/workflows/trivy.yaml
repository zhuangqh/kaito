name: Trivy vulnerability scanner
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build-and-scan:
    name: Scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: docker-build-workspace
            image: test/workspace:latest
            registry: test
          - target: docker-build-ragengine
            image: test/ragengine:latest
            registry: test
          - target: docker-build-ragservice
            image: test/kaito-rag-service:v0.0.1
            registry: test
            build_flags: "--target dependencies"
          - target: docker-build-kaito-base
            image: test/kaito-base:v0.0.1
            registry: test
            build_flags: "--target dependencies"

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Build image from Dockerfile
        run: |
          export REGISTRY=${{ matrix.registry }}
          export IMG_TAG=latest
          export OUTPUT_TYPE="type=docker"
          make ${{ matrix.target }} ARCH=amd64 BUILD_FLAGS="${{ matrix.build_flags }}"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          version: "v0.69.2"
          image-ref: ${{ matrix.image }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN"
