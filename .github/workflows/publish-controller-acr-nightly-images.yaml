                      ],
                      "releasetrains": [
                          "dev",
                          "preview"
                      ],
                      "fullPathToHelmChart": "'"${KAITO_EXTENSION_REGISTRY}"'/helm/workspace",
                      "isCustomerHidden": false,
                      "packageConfigName": "since-0.9.3"
                  }
              ]
          }'
