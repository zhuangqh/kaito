name: Build and Push Preset Images

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - 'release-*'
    paths:
      - 'presets/workspace/models/supported_models.yaml'
      - 'presets/workspace/inference/**'
      - 'presets/workspace/dependencies/**'
      - 'presets/workspace/tuning/**'
      - 'docker/presets/models/tfs/Dockerfile'
  workflow_dispatch:
    inputs:
      build_base_image:
        description: 'Build the base image'
        type: boolean
        default: false
      base_image_tag:
        description: 'Base image tag (required when build_base_image is true, e.g. v0.9.0)'
        type: string
        required: false

env:
    GO_VERSION: "1.25"
    BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    WEIGHTS_DIR: "/mnt/storage"

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  # -------------------------------------------------------------------
  # Detect which builds are needed based on changed files
  # -------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      build_base_image: ${{ steps.check.outputs.build_base_image }}
      base_image_tag: ${{ steps.check.outputs.base_image_tag }}
      build_models: ${{ steps.check.outputs.build_models }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Detect changes
        id: check
        run: |
          # workflow_dispatch: use inputs directly
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "build_base_image=${{ inputs.build_base_image }}" >> $GITHUB_OUTPUT
            echo "base_image_tag=${{ inputs.base_image_tag }}" >> $GITHUB_OUTPUT
            # workflow_dispatch without build_base_image means build models
            if [ "${{ inputs.build_base_image }}" != "true" ]; then
              echo "build_models=true" >> $GITHUB_OUTPUT
            else
              echo "build_models=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # push event: check changed files
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }}..${{ github.sha }})

          BUILD_BASE=false
          BUILD_MODELS=false

          if echo "$CHANGED_FILES" | grep -qE '^(presets/workspace/(inference|dependencies|tuning)/|docker/presets/models/tfs/Dockerfile)'; then
            BUILD_BASE=true
          fi
          if echo "$CHANGED_FILES" | grep -qF 'presets/workspace/models/supported_models.yaml'; then
            BUILD_MODELS=true
          fi

          echo "build_base_image=$BUILD_BASE" >> $GITHUB_OUTPUT
          echo "build_models=$BUILD_MODELS" >> $GITHUB_OUTPUT

          # Determine base image tag
          if [ "$BUILD_BASE" == "true" ]; then
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "base_image_tag=latest" >> $GITHUB_OUTPUT
            elif [[ "${{ github.ref }}" == refs/heads/release-* ]]; then
              MINOR_VERSION=$(echo "${{ github.ref_name }}" | sed 's/release-//')
              LATEST_TAG=$(git tag --list "v${MINOR_VERSION}.*" --sort=-v:refname | head -1)
              if [ -n "$LATEST_TAG" ]; then
                echo "base_image_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
              else
                echo "base_image_tag=v${MINOR_VERSION}.0" >> $GITHUB_OUTPUT
              fi
            fi
          fi

          echo "build_base_image=$BUILD_BASE build_models=$BUILD_MODELS"

  # -------------------------------------------------------------------
  # Build the workspace base image (kaito-base)
  # -------------------------------------------------------------------
  build-base-image:
    needs: detect-changes
    if: needs.detect-changes.outputs.build_base_image == 'true'
    runs-on: ubuntu-latest
    environment: preset-env
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Print image tag
        run: echo "Base image tag will be ${{ needs.detect-changes.outputs.base_image_tag }}"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.PROD_1ES_ACR_PASSWORD }}" | docker login "${{ secrets.PROD_1ES_ACR_USERNAME }}.azurecr.io" \
            -u "${{ secrets.PROD_1ES_ACR_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        run: |
          if ! docker buildx inspect img-builder &>/dev/null; then
            docker buildx create --name=img-builder --driver=docker-container --use --bootstrap \
              --driver-opt image=mcr.microsoft.com/oss/v2/moby/buildkit:v0.20.2
          else
            docker buildx use img-builder
          fi

      - name: Build and push
        run: |
          TAG="${{ needs.detect-changes.outputs.base_image_tag }}"
          docker buildx build \
            --builder img-builder \
            --build-arg VERSION=$TAG \
            --build-arg MODEL_TYPE=text-generation \
            -t ghcr.io/kaito-project/kaito/kaito-base:$TAG \
            -t ${{ secrets.PROD_1ES_ACR_USERNAME }}.azurecr.io/unlisted/aks/kaito/kaito-base:$TAG \
            -o type=image,push=true,compression=zstd \
            -f ./docker/presets/models/tfs/Dockerfile .

  # -------------------------------------------------------------------
  # Determine which preset model images need building
  # -------------------------------------------------------------------
  determine-models:
    needs: detect-changes
    if: needs.detect-changes.outputs.build_models == 'true'
    runs-on: ubuntu-latest
    environment: preset-env
    outputs:
      matrix: ${{ steps.affected_models.outputs.matrix }}
      is_matrix_empty: ${{ steps.check_matrix_empty.outputs.is_empty }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
          fetch-depth: 0

      - name: Download crane
        run: |
          if ! command -v crane &> /dev/null; then
            wget -q https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz -O /tmp/crane.tar.gz
            tar -xzf /tmp/crane.tar.gz -C /tmp crane
            chmod +x /tmp/crane
            sudo mv /tmp/crane /usr/local/bin/crane
          fi

      - name: Determine Affected Models
        id: affected_models
        run: python3 .github/determine_missing_preset_images.py

      - name: Print Determined Models
        run: |
          echo "Output from affected_models: ${{ steps.affected_models.outputs.matrix }}"

      - name: Check if Matrix is Empty
        id: check_matrix_empty
        run: |
          if [ "${{ steps.affected_models.outputs.matrix }}" == "[]" ] || [ -z "${{ steps.affected_models.outputs.matrix }}" ]; then
            echo "is_empty=true" >> $GITHUB_OUTPUT
          else
            echo "is_empty=false" >> $GITHUB_OUTPUT
          fi

  build-models:
    needs: determine-models
    if: needs.determine-models.outputs.is_matrix_empty == 'false'
    runs-on:
      - self-hosted
      - 1ES.Pool=1es-aks-kaito-image-build-agent-pool-ubuntu
      - JobId=buildModels-${{ strategy.job-index }}-${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}
    environment: preset-env
    strategy:
      fail-fast: false
      matrix:
        model: ${{fromJson(needs.determine-models.outputs.matrix)}}
      max-parallel: 10
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Azure CLI latest
        run: |
          if ! which az > /dev/null; then
              echo "Azure CLI not found. Installing..."
              curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          else
              echo "Azure CLI already installed."
          fi

      - name: Ensure Docker is Installed
        run: |
          # Add Docker's official GPG key:
          sudo apt-get update
          sudo apt-get install ca-certificates curl -y
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add the repository to Apt sources:
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin -y

          # User Permissions
          sudo usermod -aG docker $(whoami)
          sudo systemctl restart docker
          sudo chmod 666 /var/run/docker.sock

      - name: Test Docker Access
        run: |
          ls -l /var/run/docker.sock
          docker run hello-world

      - name: List All Disks
        run: |
          lsblk
          if ! mountpoint -q /mnt/storage; then
            echo "Failed to find required storage partition /mnt/storage"
            exit 1
          fi

      - name: Ensure Python is Installed
        run: |
          sudo apt-get update
          sudo apt-get install -y python3
          sudo apt install python3-pip -y

      - name: Ensure git and git LFS is Installed
        run: |
          if ! command -v git &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y git
          fi
          if ! git lfs --version &> /dev/null; then
            sudo apt-get update
            curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | sudo bash
            sudo apt-get install -y git-lfs
            git lfs install
          fi

      - name: Configure Docker to Use /mnt/storage/docker
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /mnt/storage/docker
          # Move existing Docker data
          if [ -d /var/lib/docker ]; then
            sudo rsync -aP /var/lib/docker/ /mnt/storage/docker/
          fi
          echo '{"data-root":"/mnt/storage/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker

      - name: Verify Docker Configuration
        run: |
          docker info | grep "Docker Root Dir"

      - name: Set Permissions for DataDrive /mnt/storage
        run : |
          sudo chown -R $(whoami) /mnt/storage
          sudo chmod -R 775 /mnt/storage

          sudo apt-get update
          sudo apt-get install acl -y

          sudo setfacl -dm u::rwx /mnt/storage  # Default user permissions
          sudo setfacl -dm g::rwx /mnt/storage  # Default group permissions
          sudo setfacl -dm o::rx /mnt/storage   # Default others permissions

      - name: Authenticate to ACR
        run: |
          az login --identity
          az acr login -n ${{ secrets.PROD_1ES_ACR_USERNAME }}

      - name: Call Reusable Workflow - Build Image
        uses: ./.github/actions/build-image-action
        with:
          weights_dir: ${{ env.WEIGHTS_DIR }}
          branch_name: ${{ env.BRANCH_NAME }}
          image_name: unlisted/aks/kaito/kaito-${{ matrix.model.name }}
          image_tag: ${{ matrix.model.tag }}
          acr_name: ${{ secrets.PROD_1ES_ACR_USERNAME }}
          acr_username: ${{ secrets.PROD_1ES_ACR_USERNAME }}
          acr_password: ${{ secrets.PROD_1ES_ACR_PASSWORD }}
          ghcr_username: ${{ github.actor }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
          model_name: ${{ matrix.model.name }}
          model_type: ${{ matrix.model.type }}
          model_version: ${{ matrix.model.version }}
          model_runtime: ${{ matrix.model.runtime }}
          hf_username: ${{ secrets.HF_USERNAME }}
          hf_token: ${{ secrets.HF_TOKEN }}
