name: "e2e-base-setup"
description: "Composite action for e2e base setup"

inputs:
  git_sha:
    description: "Git commit SHA"
    required: true
  node_provisioner:
    description: "Provisioner type"
    required: false
    default: "gpuprovisioner"
  tag:
    description: "Tag"
    required: false
  isRelease:
    description: "Is Release"
    required: false
    default: "false"
  registry:
    description: "Registry"
    required: false
  region:
    description: "the azure location to run the e2e test in"
    required: false
    default: "swedencentral"
  k8s_version:
    description: "Kubernetes version"
    required: false
    default: "1.33.8"
  build_kaito_base_image:
    description: "Whether to build kaito base image"
    required: false
    default: "false"
  skip_helm_install:
    description: "Skip Helm installation of KAITO charts"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set e2e Resource and Cluster Name
      shell: bash
      run: |
        ID="ri${{ github.run_id }}rn${{ github.run_number }}ra${{ github.run_attempt }}$(head /dev/urandom | tr -dc a-z0-9 | head -c 4)"

        echo "VERSION=${ID}" >> $GITHUB_ENV
        echo "CLUSTER_NAME=kaito${ID}" >> $GITHUB_ENV
        echo "REGISTRY=kaito${ID}.azurecr.io" >> $GITHUB_ENV

    - name: Set Registry
      if: ${{ inputs.isRelease == 'true' }}
      shell: bash
      run: |
        echo "REGISTRY=${{ inputs.registry }}" >> $GITHUB_ENV
        echo "VERSION=$(echo ${{ inputs.tag }} | tr -d v)" >> $GITHUB_ENV

    - name: Remove existing Go modules directory
      shell: bash
      run: sudo rm -rf ~/go/pkg/mod

    - name: Set up Go ${{ env.GO_VERSION  }}
      uses: actions/setup-go@v5.2.0
      with:
        go-version: ${{ env.GO_VERSION  }}

    - name: Install Azure CLI latest
      shell: bash
      run: |
        if ! which az > /dev/null; then
          echo "Azure CLI not found. Installing..."
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        else
          echo "Azure CLI already installed."
        fi

    - name: Azure CLI Login
      shell: bash
      run: |
        az login --identity

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.19.4'

    - name: Create Resource Group
      shell: bash
      run: |
        make create-rg
      env:
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}

    - name: Create ACR
      shell: bash
      run: |
          az acr create --name "$AZURE_ACR_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION" --sku Standard --admin-enabled -o none
          az acr login  --name "$AZURE_ACR_NAME"
          # Enable anonymous pull and public network access to make it easier for testing
          az acr update --name "$AZURE_ACR_NAME" --anonymous-pull-enabled true
      env:
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_ACR_NAME: ${{ env.CLUSTER_NAME }}
        AZURE_LOCATION: ${{ inputs.region }}

    - name: Create Azure Identity
      uses: azure/CLI@v2.1.0
      with:
        inlineScript: |
          az identity create --name "${{ inputs.node_provisioner }}Identity" --resource-group "${{ env.CLUSTER_NAME }}"

    - name: Generate APIs
      shell: bash
      run: |
        make generate

    - name: Install HuggingFace CLI
      shell: bash
      run: |
        echo "Installing HuggingFace CLI..."
        if ! pip install huggingface-hub; then
          pip install huggingface-hub --break-system-packages
        fi

    - name: Install ORAS CLI
      shell: bash
      run: |
        if ! command -v oras &> /dev/null; then
          echo "Installing ORAS CLI..."
          ORAS_VERSION=$(curl -s https://api.github.com/repos/oras-project/oras/releases/latest | grep 'tag_name' | cut -d\" -f4)
          curl -LO "https://github.com/oras-project/oras/releases/download/${ORAS_VERSION}/oras_${ORAS_VERSION#v}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf "oras_${ORAS_VERSION#v}_linux_amd64.tar.gz" -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras-install "oras_${ORAS_VERSION#v}_linux_amd64.tar.gz"
        else
          echo "ORAS CLI already installed."
        fi
        oras version

    - name: build KAITO base image
      shell: bash
      if: ${{ inputs.build_kaito_base_image == 'true' }}
      run: |
        docker buildx build \
          --builder img-builder \
          --build-arg VERSION=$VERSION \
          --build-arg MODEL_TYPE=text-generation \
          --output type=image,name=$REGISTRY/kaito-base:$VERSION,push=true,compression=zstd \
          -f ./docker/presets/models/tfs/Dockerfile .

    - name: Verify vLLM arch list is up-to-date
      shell: bash
      if: ${{ inputs.build_kaito_base_image == 'true' }}
      run: |
        echo "Extracting supported vLLM architectures from newly built base image..."
        EXPECTED=$(docker run --rm \
          --entrypoint python3 \
          "$REGISTRY/kaito-base:$VERSION" \
          /workspace/vllm/list_supported_llm_archs.py)

        if [ -z "$EXPECTED" ]; then
          echo "ERROR: Docker command produced no output from list_supported_llm_archs.py" >&2
          exit 1
        fi

        ACTUAL=$(cat presets/workspace/models/vllm_model_arch_list.txt)

        if [ "$ACTUAL" != "$EXPECTED" ]; then
          echo "ERROR: presets/workspace/models/vllm_model_arch_list.txt is out of date." >&2
          echo "Please regenerate it by running: make generate-vllm-arch-list" >&2
          echo "" >&2
          echo "--- actual (committed file) ---" >&2
          echo "$ACTUAL" >&2
          echo "--- expected (from image) ---" >&2
          echo "$EXPECTED" >&2
          exit 1
        fi

        echo "vllm_model_arch_list.txt is up to date."

    - name: Build preset images
      shell: bash
      run: |
        # For building newly introduced preset images or bumping the tags of existing ones.
        # Without this step, the Workspace controller during e2e test will attempt to pull
        # non-existent images from remote registry, leading to test failures.
        python3 .github/determine_missing_preset_images.py | jq -c '.[]' | while read -r model; do
          export MODEL_NAME=$(echo "$model" | jq -r '.name')

          # Push preset model weights as OCI artifact to ACR using ORAS
          if [ "$MODEL_NAME" != "base" ]; then
            export MODEL_VERSION_URL=$(echo "$model" | jq -r '.version')

            # Use shared script to build and push OCI artifact
            docker/presets/models/tfs/build_oci_artifact.sh \
              "$MODEL_VERSION_URL" \
              "kaito-$MODEL_NAME" \
              "${{ env.REGISTRY }}" \
              "${{ env.VERSION }}" \
              "$HF_TOKEN"
          fi

          # Override image properties in supported_models.yaml for testing purposes.
          # The updated supported_models.yaml will be read by the Workspace controller via
          # go:embed in presets/workspace/models/metadata.go.
          yq '(.models[] | select(.name == strenv(MODEL_NAME)) | .registry) = "${{ env.REGISTRY }}"' -i presets/workspace/models/supported_models.yaml
          yq '(.models[] | select(.name == strenv(MODEL_NAME)) | .tag) = "${{ env.VERSION }}"' -i presets/workspace/models/supported_models.yaml
        done

        cat presets/workspace/models/supported_models.yaml
      env:
        WEIGHTS_DIR: "/datadrive"

    - name: build KAITO image
      if: ${{ inputs.isRelease == 'false' }}
      shell: bash
      run: |
        make docker-build-workspace
      env:
        ARCH: amd64

    # TEMPORARY FIX (capacity issue): try the requested `inputs.region` first,
    # and fall back to polandcentral if that region has no capacity.
    # The RG/ACR created earlier stay in `inputs.region`; only the AKS cluster
    # moves regions on fallback (RG can host an AKS resource in another region).
    # TODO: remove this fallback once regional capacity is restored.
    - name: create cluster (karpenter)
      if: ${{ inputs.node_provisioner == 'azkarpenter' }}
      shell: bash
      run: |
        # TEMPORARY FIX: capacity fallback -> polandcentral.
        create_karpenter_cluster() {
          local location="$1"
          local vm_size="$2"
          az aks create --name "$AZURE_CLUSTER_NAME" --resource-group "$AZURE_RESOURCE_GROUP" \
            --location "$location" --attach-acr "$AZURE_ACR_NAME" --node-vm-size "$vm_size" \
            --kubernetes-version "$AKS_K8S_VERSION" --generate-ssh-keys \
            --network-plugin azure --network-plugin-mode overlay --network-dataplane cilium \
            --enable-managed-identity --enable-oidc-issuer --enable-workload-identity -o none
        }

        set +e
        create_karpenter_cluster "$AZURE_LOCATION" Standard_D4d_v4
        rc=$?
        set -e
        if [ $rc -ne 0 ]; then
          echo "::warning::$AZURE_LOCATION AKS creation failed (rc=$rc); retrying in polandcentral with Standard_NV12ads_A10_v5"
          create_karpenter_cluster polandcentral Standard_NV12ads_A10_v5
        fi
        az aks get-credentials --name "$AZURE_CLUSTER_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --overwrite-existing
      env:
        AZURE_ACR_NAME: ${{ env.CLUSTER_NAME }}
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
        AZURE_LOCATION: ${{ inputs.region }}
        AKS_K8S_VERSION: ${{ inputs.k8s_version }}

    - name: create cluster (gpu-provisioner)
      if: ${{ inputs.node_provisioner == 'gpuprovisioner' }}
      shell: bash
      run: |
        # TEMPORARY FIX: capacity fallback -> polandcentral.
        create_gpu_cluster() {
          local location="$1"
          local vm_size="$2"
          az aks create --name "$AZURE_CLUSTER_NAME" --resource-group "$AZURE_RESOURCE_GROUP" \
            --location "$location" --attach-acr "$AZURE_ACR_NAME" \
            --kubernetes-version "$AKS_K8S_VERSION" --generate-ssh-keys \
            --enable-managed-identity --enable-workload-identity --enable-oidc-issuer \
            --node-vm-size "$vm_size" -o none
        }

        set +e
        create_gpu_cluster "$AZURE_LOCATION" Standard_D4d_v4
        rc=$?
        set -e
        if [ $rc -ne 0 ]; then
          echo "::warning::$AZURE_LOCATION AKS creation failed (rc=$rc); retrying in polandcentral with Standard_NV12ads_A10_v5"
          create_gpu_cluster polandcentral Standard_NV12ads_A10_v5
        fi
        az aks get-credentials --name "$AZURE_CLUSTER_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --overwrite-existing
      env:
        AZURE_ACR_NAME: ${{ env.CLUSTER_NAME }}
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
        AZURE_LOCATION: ${{ inputs.region }}
        AKS_K8S_VERSION: ${{ inputs.k8s_version }}

    - name: Provision model-streaming infra (blob CSI + StorageClass + role)
      shell: bash
      run: |
        set -euo pipefail
        AKS="${CLUSTER_NAME}"
        RG="${CLUSTER_NAME}"
        echo "Enabling blob CSI driver..."
        az aks update --enable-blob-driver -n "$AKS" -g "$RG" --yes --only-show-errors -o none

        echo "Creating blob-fuse StorageClass..."
        cat <<'EOF' | kubectl apply -f -
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: blob-fuse
        provisioner: blob.csi.azure.com
        allowVolumeExpansion: true
        parameters:
          protocol: fuse2
          skuName: Premium_LRS
        reclaimPolicy: Retain
        mountOptions:
          - -o allow_other
          - -o attr_timeout=120
          - -o entry_timeout=120
          - -o negative_timeout=120
          - --cancel-list-on-mount-seconds=10
          - --use-attr-cache=true
          - --block-cache
          - --block-cache-block-size=16
          - --block-cache-pool-size=8192
          - --block-cache-prefetch=11
        EOF

        echo "Resolving kubelet identity + OIDC issuer..."
        KUBELET_RESOURCE_ID=$(az aks show -n "$AKS" -g "$RG" --query "identityProfile.kubeletidentity.resourceId" -o tsv)
        KUBELET_CLIENT_ID=$(az aks show -n "$AKS" -g "$RG" --query "identityProfile.kubeletidentity.clientId" -o tsv)
        KUBELET_PRINCIPAL_ID=$(az identity show --ids "$KUBELET_RESOURCE_ID" --query principalId -o tsv)
        KUBELET_IDENTITY_NAME=$(echo "$KUBELET_RESOURCE_ID" | awk -F'/' '{print $NF}')
        KUBELET_IDENTITY_RG=$(echo "$KUBELET_RESOURCE_ID" | awk -F'/resourcegroups/' '{print $2}' | awk -F'/' '{print $1}')
        if [ -z "$KUBELET_IDENTITY_RG" ]; then
          KUBELET_IDENTITY_RG=$(echo "$KUBELET_RESOURCE_ID" | awk -F'/resourceGroups/' '{print $2}' | awk -F'/' '{print $1}')
        fi
        OIDC_ISSUER=$(az aks show -n "$AKS" -g "$RG" --query "oidcIssuerProfile.issuerUrl" -o tsv)

        echo "Assigning Storage Blob Data Reader on the node resource group (up-front)..."
        MC_RG=$(az aks show -n "$AKS" -g "$RG" --query nodeResourceGroup -o tsv)
        SUB_ID=$(az account show --query id -o tsv)
        az role assignment create \
          --role "Storage Blob Data Reader" \
          --assignee-object-id "$KUBELET_PRINCIPAL_ID" \
          --assignee-principal-type ServicePrincipal \
          --scope "/subscriptions/${SUB_ID}/resourceGroups/${MC_RG}" -o none || true

        # Export for later steps (the e2e suite creates the per-namespace SA + FIC).
        echo "STREAMING_ENABLED=true" >> "$GITHUB_ENV"
        echo "STREAMING_KUBELET_CLIENT_ID=$KUBELET_CLIENT_ID" >> "$GITHUB_ENV"
        echo "STREAMING_KUBELET_IDENTITY_NAME=$KUBELET_IDENTITY_NAME" >> "$GITHUB_ENV"
        echo "STREAMING_KUBELET_IDENTITY_RG=$KUBELET_IDENTITY_RG" >> "$GITHUB_ENV"
        echo "STREAMING_OIDC_ISSUER=$OIDC_ISSUER" >> "$GITHUB_ENV"

    - name: Create Identities and Permissions for ${{ inputs.node_provisioner }}
      shell: bash
      run: |
        AZURE_SUBSCRIPTION_ID=$E2E_SUBSCRIPTION_ID \
        make generate-identities
      env:
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
        TEST_SUITE: ${{ inputs.node_provisioner }}

    - name: Install karpenter helm chart
      if: ${{ inputs.node_provisioner == 'azkarpenter' }}
      shell: bash
      run: |
        # Ensure yq v4.30+ is available for envsubst(nu) support required by configure-values.sh
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        AZURE_SUBSCRIPTION_ID=$E2E_SUBSCRIPTION_ID \
        make azure-karpenter-helm
      env:
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}

    - name: Install gpu-provisioner helm chart
      if: ${{ inputs.node_provisioner == 'gpuprovisioner' }}
      shell: bash
      run: |
        AZURE_SUBSCRIPTION_ID=$E2E_SUBSCRIPTION_ID \
        make gpu-provisioner-helm
      env:
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}

    - name: Install KAITO Workspace helm chart
      if: ${{ inputs.skip_helm_install == 'false' }}
      shell: bash
      run: |
        make az-patch-install-helm
        kubectl wait --for=condition=available deploy "kaito-workspace" -n kaito-workspace --timeout=300s
      env:
        AZURE_RESOURCE_GROUP: ${{ env.CLUSTER_NAME }}
        AZURE_CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
        REGISTRY: ${{ env.REGISTRY }}
        VERSION: ${{ env.VERSION }}
        TEST_SUITE: ${{ inputs.node_provisioner }}
        HELM_INSTALL_EXTRA_ARGS: "--set featureGates.gatewayAPIInferenceExtension=true --set featureGates.enableInferenceSetController=true --set featureGates.enableMultiRoleInferenceController=true --set featureGates.enableBaseImageAutoUpgrade=true --set featureGates.ModelMirror=true --set featureGates.ModelStreaming=true --set defaultModelMirrorStorageClass=blob-fuse --set defaultStreamingServiceAccount=kaito-model-streamer --set modelMirrorDownloadCPU=2 --set modelMirrorDownloadMemory=4Gi --set nodeProvisioner=${{ inputs.node_provisioner == 'gpuprovisioner' && 'azure-gpu-provisioner' || 'karpenter' }}"

    - name: Install Istio and Gateway for E2E testing
      shell: bash
      run: |
        echo "Installing Istio for E2E testing..."
        helm repo add istio https://istio-release.storage.googleapis.com/charts --force-update
        helm repo update
        helm upgrade --install istio-base istio/base --namespace istio-system --create-namespace --version 1.28.3 --wait
        helm upgrade --install istiod istio/istiod --namespace istio-system --version 1.28.3 \
          --set pilot.env.ENABLE_GATEWAY_API_INFERENCE_EXTENSION="true" --wait
        echo "Installing Gateway API CRDs..."
        kubectl apply -k "github.com/kubernetes-sigs/gateway-api/config/crd?ref=v1.4.1"
        echo "Deploying inference gateway..."
        kubectl apply -f examples/gateway-api-inference-extension/gateway.yaml -n default
        kubectl wait --for=condition=Programmed gateway/inference-gateway -n default --timeout=300s
        echo "Istio and Gateway installed successfully."

    - name: Set up E2E ACR Credentials and Secret
      shell: bash
      run: |
        ACR_USERNAME=$(az acr credential show --name "${{ env.CLUSTER_NAME }}" --resource-group "${{ env.CLUSTER_NAME }}" --query "username" -o tsv)
        ACR_PASSWORD=$(az acr credential show --name "${{ env.CLUSTER_NAME }}" --resource-group "${{ env.CLUSTER_NAME }}" --query "passwords[0].value" -o tsv)

        if [ -z "$ACR_USERNAME" ] || [ -z "$ACR_PASSWORD" ]; then
          echo "Failed to retrieve ACR credentials"
          exit 1
        fi

        kubectl create secret docker-registry "${{ env.CLUSTER_NAME }}-acr-secret" \
          --docker-server="${{ env.CLUSTER_NAME }}.azurecr.io" \
          --docker-username="${ACR_USERNAME}" \
          --docker-password="${ACR_PASSWORD}"

    # Add Private-Hosted ACR secret for private models like llama
    - name: Add Private-Hosted ACR Secret Credentials
      shell: bash
      run: |
        E2E_AMRT_SECRET_NAME=$(echo "$E2E_AMRT_SECRET_NAME" | sed 's/[\"'\'']//g')
        if kubectl get secret "$E2E_AMRT_SECRET_NAME" >/dev/null 2>&1; then
          echo "Secret $E2E_AMRT_SECRET_NAME already exists. Skipping creation."
        else
          kubectl create secret docker-registry "$E2E_AMRT_SECRET_NAME" \
            --docker-server="$E2E_ACR_AMRT_USERNAME.azurecr.io" \
            --docker-username="$E2E_ACR_AMRT_USERNAME" \
            --docker-password="$E2E_ACR_AMRT_PASSWORD"
          echo "Secret $E2E_AMRT_SECRET_NAME created successfully."
        fi
